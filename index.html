<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Welcome</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            overflow: hidden;
            color: white;
            text-align: center;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        #content {
            display: none;
            opacity: 0;
            transition: opacity 1s ease-in;
            margin-top: 20px;
        }

        p {
            font-size: 1.2rem;
            margin: 1rem 0;
            line-height: 1.6;
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            background: white;
            color: #e73c7e;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>

<div class="container">
    <button id="revealBtn">Scopri il mio mondo</button>
    <div id="content">
        <p>✨ Benvenuti nel mio spazio creativo su GitHub, dove il codice prende vita.</p>
        <p>🚀 Esplora i miei repository per scoprire progetti innovativi e soluzioni fuori dagli schemi.</p>
    </div>
</div>

<script>
    const btn = document.getElementById('revealBtn');
    const content = document.getElementById('content');

    btn.addEventListener('click', () => {
        btn.style.display = 'none';
        content.style.display = 'block';
        setTimeout(() => {
            content.style.opacity = '1';
        }, 10);
    });
</script>

</body>
</html>
