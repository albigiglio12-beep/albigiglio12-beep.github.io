<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">

<title>Verifiche di Francese – Unité 14</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1a2a4a;
    --blue: #2563eb;
    --sky: #dbeafe;
    --gold: #f59e0b;
    --red: #dc2626;
    --green: #16a34a;
    --paper: #fdfaf4;
    --ink: #1c1c1c;
    --light: #f3f4f6;
    --border: #d1d5db;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Source Serif 4', Georgia, serif;
    background: #e8edf5;
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── Layout with sidebar ── */
  .page-layout {
    display: flex;
    align-items: flex-start;
    gap: 0;
    position: relative;
  }
  #main-content {
    flex: 1;
    min-width: 0;
  }

  /* ── Accent Keyboard Sidebar ── */
  .accent-sidebar {
    width: 130px;
    flex-shrink: 0;
    position: sticky;
    top: 58px;
    max-height: calc(100vh - 70px);
    overflow-y: auto;
    background: var(--navy);
    border-radius: 0 0 12px 0;
    padding: .8rem .6rem 1rem;
    box-shadow: 3px 4px 16px rgba(0,0,0,.2);
    z-index: 90;
  }
  .accent-sidebar h3 {
    color: var(--gold);
    font-family: 'Playfair Display', serif;
    font-size: .8rem;
    text-align: center;
    margin-bottom: .7rem;
    letter-spacing: .5px;
    text-transform: uppercase;
  }
  .accent-group {
    margin-bottom: .7rem;
  }
  .accent-group-label {
    color: rgba(255,255,255,.45);
    font-size: .65rem;
    text-transform: uppercase;
    letter-spacing: .5px;
    margin-bottom: .3rem;
    padding-left: .1rem;
  }
  .accent-keys {
    display: flex;
    flex-wrap: wrap;
    gap: .3rem;
  }
  .acc-key {
    background: rgba(255,255,255,.1);
    border: 1.5px solid rgba(255,255,255,.2);
    border-radius: 5px;
    color: white;
    font-size: 1rem;
    width: 32px;
    height: 32px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all .15s;
    font-family: 'Source Serif 4', serif;
    user-select: none;
    -webkit-user-select: none;
  }
  .acc-key:hover {
    background: var(--gold);
    color: #000;
    border-color: var(--gold);
    transform: scale(1.12);
  }
  .acc-key:active { transform: scale(.95); }
  .accent-divider {
    border: none;
    border-top: 1px solid rgba(255,255,255,.1);
    margin: .5rem 0;
  }
  .acc-hint {
    color: rgba(255,255,255,.4);
    font-size: .62rem;
    text-align: center;
    margin-top: .8rem;
    line-height: 1.5;
  }

  /* ── Header ── */
  header {
    background: var(--navy);
    color: white;
    padding: 2rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      45deg, transparent, transparent 20px,
      rgba(255,255,255,.03) 20px, rgba(255,255,255,.03) 40px
    );
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    letter-spacing: 1px;
    position: relative;
  }
  header p { opacity: .7; margin-top: .3rem; font-size: .95rem; position: relative; }
  .flag { font-size: 1.5rem; margin-right: .5rem; }

  /* ── Nav tabs ── */
  nav {
    background: white;
    padding: .8rem 1.5rem;
    display: flex;
    gap: .5rem;
    flex-wrap: wrap;
    justify-content: center;
    border-bottom: 3px solid var(--navy);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,.15);
  }
  .tab-btn {
    background: var(--light);
    border: 2px solid var(--border);
    border-radius: 6px;
    padding: .45rem .9rem;
    cursor: pointer;
    font-family: 'Source Serif 4', serif;
    font-size: .85rem;
    font-weight: 600;
    color: var(--navy);
    transition: all .2s;
    position: relative;
  }
  .tab-btn:hover { background: var(--sky); border-color: var(--blue); }
  .tab-btn.active {
    background: var(--navy);
    color: white;
    border-color: var(--navy);
  }
  .tab-btn .diff {
    position: absolute;
    top: -8px; right: -8px;
    width: 18px; height: 18px;
    border-radius: 50%;
    font-size: .6rem;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900;
    color: white;
  }

  /* ── Main ── */
  main { max-width: 860px; margin: 2rem auto; padding: 0 1rem 4rem; }

  /* ── Verifica card ── */
  .verifica { display: none; }
  .verifica.active { display: block; }

  .verifica-header {
    background: var(--navy);
    color: white;
    border-radius: 12px 12px 0 0;
    padding: 1.4rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: .5rem;
  }
  .verifica-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
  }
  .meta { display: flex; gap: 1rem; font-size: .85rem; opacity: .85; }
  .badge {
    background: var(--gold);
    color: #000;
    border-radius: 20px;
    padding: .25rem .8rem;
    font-weight: 700;
    font-size: .8rem;
  }

  .verifica-body {
    background: var(--paper);
    border: 2px solid var(--navy);
    border-top: none;
    border-radius: 0 0 12px 12px;
    padding: 2rem;
    box-shadow: 4px 6px 20px rgba(0,0,0,.12);
  }

  /* ── Student info ── */
  .student-info {
    display: flex;
    gap: 2rem;
    margin-bottom: 1.8rem;
    padding-bottom: 1rem;
    border-bottom: 2px dashed var(--border);
    flex-wrap: wrap;
  }
  .student-info label { font-size: .85rem; color: #555; }
  .student-info input {
    border: none;
    border-bottom: 1.5px solid var(--ink);
    background: transparent;
    font-family: 'Source Serif 4', serif;
    font-size: .95rem;
    padding: .2rem .4rem;
    min-width: 160px;
    outline: none;
  }
  .student-info input:focus { border-bottom-color: var(--blue); }

  /* ── Section ── */
  .section {
    margin-bottom: 2rem;
  }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    color: var(--navy);
    border-left: 4px solid var(--gold);
    padding-left: .7rem;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: .5rem;
  }
  .section-title .pts {
    background: var(--sky);
    color: var(--blue);
    border-radius: 10px;
    padding: .1rem .5rem;
    font-size: .75rem;
    font-family: 'Source Serif 4', serif;
    font-weight: 600;
  }
  .section-instructions {
    font-style: italic;
    color: #555;
    font-size: .9rem;
    margin-bottom: .8rem;
  }

  /* ── Exercise items ── */
  .exercise-item {
    display: flex;
    align-items: baseline;
    gap: .6rem;
    margin-bottom: .7rem;
    font-size: .95rem;
    line-height: 1.6;
  }
  .num {
    font-weight: 700;
    color: var(--navy);
    min-width: 22px;
    font-size: .85rem;
  }
  .blank {
    display: inline-block;
    border-bottom: 1.5px solid var(--ink);
    min-width: 100px;
    height: 1.2em;
    vertical-align: middle;
    background: transparent;
    outline: none;
    border-top: none; border-left: none; border-right: none;
    font-family: 'Source Serif 4', serif;
    font-size: .95rem;
    padding: 0 .3rem;
    color: var(--ink);
  }
  .blank:focus { border-bottom-color: var(--blue); background: var(--sky); }
  .blank.correct { border-bottom-color: var(--green); background: #dcfce7; }
  .blank.wrong { border-bottom-color: var(--red); background: #fee2e2; }

  /* Multiple choice */
  .options { display: flex; flex-wrap: wrap; gap: .5rem; margin-top: .4rem; }
  .opt-btn {
    border: 2px solid var(--border);
    border-radius: 6px;
    padding: .35rem .9rem;
    cursor: pointer;
    background: white;
    font-family: 'Source Serif 4', serif;
    font-size: .9rem;
    transition: all .15s;
  }
  .opt-btn:hover { border-color: var(--blue); background: var(--sky); }
  .opt-btn.selected { border-color: var(--navy); background: var(--navy); color: white; }
  .opt-btn.correct-choice { border-color: var(--green); background: #dcfce7; color: #166534; font-weight: 700; }
  .opt-btn.wrong-choice { border-color: var(--red); background: #fee2e2; color: #991b1b; }

  /* Match lines */
  .match-table { width: 100%; border-collapse: collapse; font-size: .9rem; }
  .match-table td { padding: .4rem .8rem; border: 1px solid var(--border); }
  .match-table td:first-child { font-weight: 600; background: var(--sky); width: 40%; }

  /* Textarea */
  .text-area {
    width: 100%; min-height: 70px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: .6rem;
    font-family: 'Source Serif 4', serif;
    font-size: .92rem;
    resize: vertical;
    background: white;
    outline: none;
    margin-top: .3rem;
    line-height: 1.7;
  }
  .text-area:focus { border-color: var(--blue); }

  /* ── Buttons ── */
  .actions {
    display: flex;
    gap: 1rem;
    margin-top: 2rem;
    justify-content: flex-end;
    flex-wrap: wrap;
  }
  .btn {
    padding: .7rem 1.6rem;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Source Serif 4', serif;
    font-size: .95rem;
    font-weight: 600;
    transition: all .2s;
  }
  .btn-primary { background: var(--navy); color: white; }
  .btn-primary:hover { background: #243b6e; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.2); }
  .btn-reset { background: white; color: var(--navy); border: 2px solid var(--navy); }
  .btn-reset:hover { background: var(--light); }
  .btn-print { background: var(--gold); color: #000; }
  .btn-print:hover { filter: brightness(1.05); }
  .btn-answers { background: #7c3aed; color: white; }
  .btn-answers:hover { background: #6d28d9; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.2); }
  .btn-answers.showing { background: #4b5563; }

  /* Answer overlay on blanks */
  .blank-answer-hint {
    display: none;
    font-size: .78rem;
    color: #7c3aed;
    font-style: italic;
    margin-left: .3rem;
    font-weight: 600;
  }
  .answers-visible .blank-answer-hint { display: inline; }
  .answers-visible .opt-btn[data-is-correct="true"] {
    border-color: #7c3aed !important;
    background: #ede9fe !important;
    color: #4c1d95 !important;
    font-weight: 700;
  }
  .btn-print:hover { filter: brightness(1.05); }

  /* ── Score banner ── */
  .score-banner {
    display: none;
    margin-top: 1.5rem;
    padding: 1.2rem 1.8rem;
    border-radius: 10px;
    font-size: 1rem;
    text-align: center;
    font-weight: 600;
    animation: fadeIn .4s ease;
  }
  .score-banner.show { display: block; }
  .score-banner.ottimo { background: #dcfce7; border: 2px solid var(--green); color: #14532d; }
  .score-banner.buono { background: #fef9c3; border: 2px solid var(--gold); color: #713f12; }
  .score-banner.insufficiente { background: #fee2e2; border: 2px solid var(--red); color: #7f1d1d; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* ── Progress indicator ── */
  .progress-bar {
    height: 5px;
    background: var(--light);
    border-radius: 0 0 10px 10px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blue), var(--gold));
    transition: width .4s ease;
    width: 0;
  }

  /* ── Difficulty stars ── */
  .stars { color: var(--gold); font-size: .9rem; }

  @media print {
    nav, .actions, .accent-sidebar { display: none; }
    .verifica { display: block !important; page-break-after: always; }
    body { background: white; }
    .verifica-body { box-shadow: none; }
    .blank { -webkit-print-color-adjust: exact; }
    .page-layout { display: block; }
  }
</style>
</head>

const tabContainer = document.getElementById('tabs');
const mainContainer = document.getElementById('main-content');

const diffColor = ['','#22c55e','#84cc16','#f59e0b','#ef4444','#7c3aed'];
const diffLabel = ['','★','★★','★★★','★★★★','★★★★★'];

verifiche.forEach((v, vi) => {
  // ── Tab button
  const btn = document.createElement('button');
  btn.className = 'tab-btn' + (vi === 0 ? ' active' : '');
  btn.innerHTML = `${v.title} <span class="diff" style="background:${diffColor[v.difficulty]}">${v.difficulty}</span>`;
  btn.onclick = () => switchTab(vi);
  tabContainer.appendChild(btn);

  // ── Verifica wrapper
  const wrap = document.createElement('div');
  wrap.className = 'verifica' + (vi === 0 ? ' active' : '');
  wrap.id = `v${vi}`;

  // Header
  const vHeader = document.createElement('div');
  vHeader.className = 'verifica-header';
  vHeader.innerHTML = `
    <div>
      <h2>${v.title} – ${v.subtitle}</h2>
      <div class="meta">
        <span>⏱ ${v.time}</span>
        <span>📝 ${v.points} punti</span>
      </div>
    </div>
    <div>
      <span class="badge stars">${diffLabel[v.difficulty]}</span>
    </div>`;

  const progressBar = document.createElement('div');
  progressBar.className = 'progress-bar';
  const pFill = document.createElement('div');
  pFill.className = 'progress-fill';
  progressBar.appendChild(pFill);

  const vBody = document.createElement('div');
  vBody.className = 'verifica-body';

  // Student info
  vBody.innerHTML = `
    <div class="student-info">
      <div><label>Nome e Cognome</label><br><input type="text" placeholder="..."></div>
      <div><label>Classe</label><br><input type="text" placeholder="..."></div>
      <div><label>Data</label><br><input type="date"></div>
      <div><label>Voto</label><br><input type="text" placeholder="___/10"></div>
    </div>`;

  // Track correctables
  let totalCorrectables = 0;

  // Sections
  v.sections.forEach((sec, si) => {
    const secDiv = document.createElement('div');
    secDiv.className = 'section';

    secDiv.innerHTML = `
      <div class="section-title">
        ${sec.icon} Esercizio ${si + 1}: ${sec.title}
        <span class="pts">${sec.pts} pt</span>
      </div>
      <p class="section-instructions">${sec.instructions}</p>`;

    if (sec.type === 'multiple-choice') {
      sec.items.forEach((item, ii) => {
        totalCorrectables++;
        const itemDiv = document.createElement('div');
        itemDiv.className = 'exercise-item';
        const optHTML = item.choices.map((c, ci) =>
          `<button class="opt-btn" data-vi="${vi}" data-si="${si}" data-ii="${ii}" data-ci="${ci}" data-is-correct="${ci === item.answer}" onclick="selectOpt(this,${ci},${item.answer})">${c}</button>`
        ).join('');
        itemDiv.innerHTML = `<span class="num">${ii + 1}.</span><span><span>${item.q}</span><div class="options">${optHTML}</div></span>`;
        secDiv.appendChild(itemDiv);
      });
    } else if (sec.type === 'fill-blank') {
      sec.items.forEach((item, ii) => {
        totalCorrectables++;
        const itemDiv = document.createElement('div');
        itemDiv.className = 'exercise-item';
        itemDiv.innerHTML = `<span class="num">${ii + 1}.</span>
          <span>${item.q.replace('___', `<input class="blank" data-answer="${item.answer}" data-vi="${vi}" placeholder="...">`)}<span class="blank-answer-hint">[${item.answer}]</span></span>`;
        secDiv.appendChild(itemDiv);
      });
    } else if (sec.type === 'textarea') {
      sec.items.forEach((item, ii) => {
        const itemDiv = document.createElement('div');
        itemDiv.className = 'exercise-item';
        itemDiv.style.flexDirection = 'column';
        itemDiv.innerHTML = `
          <div><span class="num">${ii + 1}.</span> ${item.q}</div>
          <em style="color:#888;font-size:.82rem">${item.hint}</em>
          <textarea class="text-area" placeholder="Scrivi qui la tua risposta..."></textarea>`;
        secDiv.appendChild(itemDiv);
      });
    }

    vBody.appendChild(secDiv);
  });

  // Score banner
  const scoreBanner = document.createElement('div');
  scoreBanner.className = 'score-banner';
  scoreBanner.id = `score-${vi}`;
  vBody.appendChild(scoreBanner);

  // Actions
  const actions = document.createElement('div');
  actions.className = 'actions';
  actions.innerHTML = `
    <button class="btn btn-reset" onclick="resetVerifica(${vi})">🔄 Ricomincia</button>
    <button class="btn btn-print" onclick="window.print()">🖨 Stampa</button>
    <button class="btn btn-answers" id="ans-btn-${vi}" onclick="toggleAnswers(${vi})">👁 Visualizza risposte</button>
    <button class="btn btn-primary" onclick="checkVerifica(${vi})">✅ Correggi</button>`;
  vBody.appendChild(actions);

  wrap.appendChild(vHeader);
  wrap.appendChild(progressBar);
  wrap.appendChild(vBody);
  mainContainer.appendChild(wrap);
});

// ════════════════════════════════════════════════════════════
//  INTERACTIVITY
// ════════════════════════════════════════════════════════════

function switchTab(vi) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === vi));
  document.querySelectorAll('.verifica').forEach((v, i) => v.classList.toggle('active', i === vi));
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectOpt(btn, ci, correct) {
  const group = btn.closest('.options').querySelectorAll('.opt-btn');
  group.forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

function normalizeAns(s) {
  return s.toLowerCase().trim().replace(/['']/g,"'").replace(/\s+/g,' ');
}

function checkVerifica(vi) {
  const wrap = document.getElementById(`v${vi}`);
  let correct = 0, total = 0;

  // Fill blanks
  wrap.querySelectorAll('.blank').forEach(inp => {
    total++;
    const accepted = inp.dataset.answer.split('/').map(a => normalizeAns(a));
    const val = normalizeAns(inp.value);
    if (accepted.includes(val)) {
      inp.classList.add('correct'); inp.classList.remove('wrong'); correct++;
    } else {
      inp.classList.add('wrong'); inp.classList.remove('correct');
    }
  });

  // Multiple choice
  wrap.querySelectorAll('.options').forEach(optGroup => {
    total++;
    const buttons = optGroup.querySelectorAll('.opt-btn');
    const selected = optGroup.querySelector('.opt-btn.selected');
    if (!selected) { return; }
    const ci = parseInt(selected.dataset.ci);
    const answer = parseInt(selected.dataset.ci); // use correct attr set at creation
    // Re-read correct from data
    // We stored answer in each button via onclick; parse it
    const onclickStr = selected.getAttribute('onclick');
    const match = onclickStr.match(/selectOpt\(this,\d+,(\d+)\)/);
    if (!match) return;
    const correctIdx = parseInt(match[1]);
    buttons.forEach((b, idx) => {
      const bOnclick = b.getAttribute('onclick');
      const bMatch = bOnclick.match(/selectOpt\(this,(\d+),\d+\)/);
      const bIdx = bMatch ? parseInt(bMatch[1]) : idx;
      if (bIdx === correctIdx) b.classList.add('correct-choice');
    });
    if (ci === correctIdx) { selected.classList.add('correct-choice'); selected.classList.remove('selected'); correct++; }
    else { selected.classList.add('wrong-choice'); }
  });

  // Score
  const pct = total > 0 ? Math.round(correct / total * 100) : 0;
  const fill = wrap.querySelector('.progress-fill');
  if (fill) fill.style.width = pct + '%';

  const banner = document.getElementById(`score-${vi}`);
  banner.classList.add('show');
  let cls, msg;
  if (pct >= 80) { cls = 'ottimo'; msg = `🎉 Ottimo! ${correct}/${total} risposte corrette (${pct}%)`; }
  else if (pct >= 55) { cls = 'buono'; msg = `👍 Buono! ${correct}/${total} risposte corrette (${pct}%). Ripasssa le parti in rosso.`; }
  else { cls = 'insufficiente'; msg = `📚 ${correct}/${total} risposte corrette (${pct}%). Ripassa gli argomenti e riprova!`; }
  banner.className = `score-banner show ${cls}`;
  banner.textContent = msg;
  banner.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function resetVerifica(vi) {
  const wrap = document.getElementById(`v${vi}`);
  wrap.querySelectorAll('.blank').forEach(inp => {
    inp.value = ''; inp.classList.remove('correct','wrong');
  });
  wrap.querySelectorAll('.opt-btn').forEach(b => {
    b.classList.remove('selected','correct-choice','wrong-choice');
  });
  wrap.querySelectorAll('.text-area').forEach(ta => ta.value = '');
  const banner = document.getElementById(`score-${vi}`);
  banner.classList.remove('show');
  const fill = wrap.querySelector('.progress-fill');
  if (fill) fill.style.width = '0';
}

// ════════════════════════════════════════════════════════════
//  ACCENT KEYBOARD — mousedown + preventDefault mantiene il focus
// ════════════════════════════════════════════════════════════
let lastFocused = null;

document.addEventListener('focusin', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
    lastFocused = e.target;
  }
});

// Intercetta mousedown su tutti i tasti accento: blocca il blur
document.getElementById('accentSidebar').addEventListener('mousedown', (e) => {
  const key = e.target.closest('.acc-key');
  if (!key) return;
  e.preventDefault(); // <-- impedisce che il campo perda il focus
  const char = key.dataset.char;
  if (!char || !lastFocused) return;
  insertAccent(char);
});

function insertAccent(char) {
  if (!lastFocused) return;
  const el = lastFocused;
  const start = el.selectionStart ?? el.value.length;
  const end   = el.selectionEnd   ?? el.value.length;
  el.value = el.value.slice(0, start) + char + el.value.slice(end);
  const newPos = start + char.length;
  el.selectionStart = newPos;
  el.selectionEnd   = newPos;
  el.dispatchEvent(new Event('input', { bubbles: true }));
}

// ════════════════════════════════════════════════════════════
//  TOGGLE ANSWERS
// ════════════════════════════════════════════════════════════
function toggleAnswers(vi) {
  const wrap = document.getElementById(`v${vi}`);
  const btn  = document.getElementById(`ans-btn-${vi}`);
  const showing = wrap.classList.toggle('answers-visible');
  btn.textContent = showing ? '🙈 Nascondi risposte' : '👁 Visualizza risposte';
  btn.classList.toggle('showing', showing);
}
